services:
  case-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: case-app
    volumes:
      - ./:/var/www
    ports:
      - "9000:9000"
      - "5173:5173"
    networks:
      - case-network
    depends_on:
      - case-db

  case-nginx:
    image: nginx:alpine
    container_name: case-nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - case-app
    networks:
      - case-network

  case-db:
    image: postgres:16
    container_name: case-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: case_user
      POSTGRES_PASSWORD: case_pass
      POSTGRES_DB: case_db
    ports:
      - "5432:5432"
    volumes:
      - case_data:/var/lib/postgresql/data
    networks:
      - case-network

  case-pgadmin:
    image: dpage/pgadmin4
    container_name: case-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@case.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - case-network
    depends_on:
      - case-db

networks:
  case-network:
    driver: bridge

volumes:
  case_data:
    driver: local
